name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint + Detekt
        run: ./gradlew ktlintCheck detektAll

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run JVM unit tests
        run: ./gradlew :shared:jvmTest

      - name: Generate Kover HTML + XML reports
        run: ./gradlew koverHtmlReport koverXmlReport

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kover-report
          path: build/reports/kover/html/
          retention-days: 14

      - name: Extract line coverage percentage
        id: coverage
        run: |
          XML="build/reports/kover/report.xml"
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, sys
          try:
              root = ET.parse("build/reports/kover/report.xml").getroot()
              for c in root.findall("counter"):
                  if c.get("type") == "LINE":
                      covered = int(c.get("covered", 0))
                      missed  = int(c.get("missed", 0))
                      total   = covered + missed
                      pct     = round(covered * 100 / total, 1) if total else 0.0
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write(f"percentage={pct}\n")
                          f.write(f"covered={covered}\n")
                          f.write(f"total={total}\n")
                      sys.exit(0)
          except Exception as e:
              print(f"Could not parse coverage: {e}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("percentage=N/A\ncovered=0\ntotal=0\n")
          EOF

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pct      = '${{ steps.coverage.outputs.percentage }}';
            const covered  = '${{ steps.coverage.outputs.covered }}';
            const total    = '${{ steps.coverage.outputs.total }}';
            const runId    = context.runId;
            const { owner, repo } = context.repo;

            const num   = parseFloat(pct);
            const emoji = num >= 70 ? '✅' : num >= 50 ? '⚠️' : '❌';

            const body = [
              `## ${emoji} Coverage Report — ${pct}%`,
              ``,
              `| Metric | Value |`,
              `|---|---|`,
              `| Line coverage | **${pct}%** (${covered} / ${total} lines) |`,
              `| Threshold | 70% |`,
              ``,
              `📊 [Download full Kover report](https://github.com/${owner}/${repo}/actions/runs/${runId})`,
              ``,
              `> _Generated by [CI](https://github.com/${owner}/${repo}/actions/runs/${runId}) · Updated on every push_`,
            ].join('\n');

            // Replace previous coverage comment if it exists
            const existing = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number,
            });
            for (const c of existing.data) {
              if (c.body.includes('Coverage Report')) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: context.issue.number, body,
            });
