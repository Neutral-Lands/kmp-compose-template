name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: prod
        type: choice
        options: [prod]

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Wasm → Supabase Storage
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Wasm distribution
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew :shared:wasmJsBrowserDistribution

      - name: Install Supabase CLI
        run: |
          curl -sSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref zpkhhpkpqfqodezguftf

      - name: Create storage bucket (idempotent)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase storage buckets create nouri-web --public --experimental 2>/dev/null || true

      - name: Upload to Supabase Storage
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Three slashes: ss:///bucket/path — two slashes misparse the bucket as the URI host
          supabase storage cp --experimental -r \
            shared/build/dist/wasmJs/productionExecutable/ \
            ss:///nouri-web/

      - name: Print deployment URL
        run: |
          echo "✅ Deployed to:"
          echo "https://zpkhhpkpqfqodezguftf.supabase.co/storage/v1/object/public/nouri-web/index.html"
